name: Supabase Keep Alive

on:
  schedule:
    # A cada 6 horas — garante que nunca fica 7 dias inativo
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          echo "Enviando ping para manter banco ativo..."
          curl -f -sS -o /dev/null "${{ secrets.SUPABASE_URL }}"
          echo "Ping enviado com sucesso."
