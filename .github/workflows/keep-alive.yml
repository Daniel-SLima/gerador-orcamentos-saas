name: Supabase Keep Alive

on:
  schedule:
    # A cada 3 dias às 8h GMT — mantém o banco ativo com mínimo de requisições
    - cron: '0 8 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          echo "Enviando ping para manter banco ativo..."
          curl -f -sS -o /dev/null "${{ secrets.SUPABASE_URL }}"
          echo "Ping enviado com sucesso."
